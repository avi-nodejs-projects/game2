<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Colosseum - Bots in a Field 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  /* Setup Screen */
  #setupScreen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #1a1520 0%, #0a0810 100%);
    z-index: 1000;
  }
  .setup-card {
    text-align: center; padding: 60px 80px;
    background: rgba(20, 15, 30, 0.9);
    border: 1px solid rgba(196, 168, 112, 0.3);
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(196, 168, 112, 0.1);
  }
  .setup-card h1 {
    font-size: 48px; color: #c4a870;
    letter-spacing: 8px; text-transform: uppercase;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(196, 168, 112, 0.4);
  }
  .setup-card p {
    font-size: 16px; color: #8a8a9a;
    letter-spacing: 3px; margin-bottom: 40px;
  }
  .setup-card button {
    padding: 16px 48px;
    font-size: 18px; letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(180deg, #c4a870 0%, #a08050 100%);
    color: #1a1520; border: none; border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s;
    font-weight: bold;
  }
  .setup-card button:hover {
    background: linear-gradient(180deg, #d4b880 0%, #b09060 100%);
    box-shadow: 0 0 30px rgba(196, 168, 112, 0.4);
    transform: scale(1.05);
  }

  /* HUD */
  #hud {
    position: fixed; top: 16px; right: 16px;
    background: rgba(0, 15, 30, 0.85);
    border: 1px solid rgba(196, 168, 112, 0.25);
    border-radius: 8px;
    padding: 16px 20px;
    color: #ddd; font-size: 13px;
    min-width: 340px;
    z-index: 100;
    display: none;
    backdrop-filter: blur(8px);
  }
  #hud .title {
    font-size: 11px; letter-spacing: 3px; color: #c4a870;
    text-transform: uppercase; margin-bottom: 10px;
    font-weight: bold;
  }
  #hud .player-line {
    margin-bottom: 6px; font-size: 13px;
  }
  #hud .player-line .star { color: #ffd700; }
  #hud .stat { color: #aab; }
  #hud .stat-val { color: #fff; font-weight: bold; }
  #hud .pop-line {
    font-size: 12px; color: #8a8a9a;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(196, 168, 112, 0.15);
  }
  #hud .kill-feed-title {
    font-size: 10px; letter-spacing: 2px; color: #888;
    text-transform: uppercase; margin-bottom: 6px;
  }
  #hud .kill-entry {
    font-size: 12px; color: #bbb;
    margin-bottom: 3px;
  }
  #hud .kill-entry .sword { color: #c4a870; }
  #hud .kill-entry .player-name { color: #ffd700; }
  #hud .kill-entry .time { color: #666; float: right; }

  /* Camera label */
  #cameraLabel {
    position: fixed; bottom: 20px; left: 20px;
    background: rgba(0, 15, 30, 0.75);
    border: 1px solid rgba(196, 168, 112, 0.2);
    border-radius: 6px;
    padding: 8px 16px;
    color: #c4a870; font-size: 12px;
    letter-spacing: 1px;
    z-index: 100;
    display: none;
    backdrop-filter: blur(4px);
  }
  #cameraLabel .mode { color: #ffd700; font-weight: bold; }

  /* Controls hint */
  #controlsHint {
    position: fixed; bottom: 20px; right: 20px;
    color: rgba(255,255,255,0.3);
    font-size: 11px; z-index: 100;
    display: none;
    text-align: right;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="setupScreen">
  <div class="setup-card">
    <h1>The Colosseum</h1>
    <p>Bots in a Field &mdash; 3D</p>
    <button id="startBtn">Start Simulation</button>
  </div>
</div>

<div id="hud">
  <div class="title">BOTS IN A FIELD &mdash; COLOSSEUM</div>
  <div class="player-line" id="playerStats"></div>
  <div class="pop-line" id="popLine"></div>
  <div class="kill-feed-title">KILL FEED:</div>
  <div id="killFeed"></div>
</div>

<div id="cameraLabel">
  <span class="mode" id="camMode">[AUTO]</span> <span id="camName">Aerial</span>
</div>

<div id="controlsHint">
  1-5: Camera | 0: Auto Director | TAB: Cycle Bot<br>
  SPACE: Pause | ESC: Reset | Drag: Orbit
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// =====================================================================
// Game Engine (from shared/game-engine.js)
// =====================================================================
const WORLD_WIDTH = 2000;
const WORLD_HEIGHT = 2000;
const BOT_COUNT = 20;
const DOT_COUNT = 50;
const STARTING_STATS = { speed: 5, attack: 5, defence: 5, lives: 3 };
const TOTAL_POINTS = 18;

class YellowDot {
  constructor() {
    this.size = 6;
    this.respawn();
  }
  respawn() {
    const m = 50;
    this.x = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.y = m + Math.random() * (WORLD_HEIGHT - m * 2);
  }
}

class Bot {
  constructor(index, isPlayer = false) {
    this.index = index;
    this.isPlayer = isPlayer;
    this.size = 10 + Math.random() * 6;
    this.hue = isPlayer ? 200 : Math.random() * 360;
    this.color = `hsl(${this.hue}, 70%, 50%)`;
    this.colorHex = this._hslToHex(this.hue, 70, 50);
    this.killCount = 0;
    this.deathCount = 0;
    this.combatCooldown = 0;
    this.idleTime = 0;
    this.maxIdle = 60 + Math.random() * 120;
    this.angle = 0;
    this.lifetime = 0;
    this.justTookDamage = false;
    this.justDealtDamage = false;
    this.damageTimer = 0;
    this.damageDealtTimer = 0;
    this.lastAttacker = null;

    this.speed = STARTING_STATS.speed;
    this.attack = STARTING_STATS.attack;
    this.defence = STARTING_STATS.defence;
    this.lives = STARTING_STATS.lives;
    this.initialLives = this.lives;

    this.spawnAtRandom();
  }

  _hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
    return (Math.round(f(0) * 255) << 16) | (Math.round(f(8) * 255) << 8) | Math.round(f(4) * 255);
  }

  get totalStats() { return this.speed + this.attack + this.defence + this.lives; }

  spawnAtRandom() {
    const m = 100;
    this.x = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.y = m + Math.random() * (WORLD_HEIGHT - m * 2);
    this.targetX = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.targetY = m + Math.random() * (WORLD_HEIGHT - m * 2);
    this.idleTime = 0;
    this.maxIdle = 60 + Math.random() * 120;
    this.combatCooldown = 0;
  }

  resetStats() {
    this.speed = STARTING_STATS.speed;
    this.attack = STARTING_STATS.attack;
    this.defence = STARTING_STATS.defence;
    this.lives = STARTING_STATS.lives;
    this.initialLives = this.lives;
  }

  addRandomStat() {
    const stats = ['speed', 'attack', 'defence', 'lives'];
    const stat = stats[Math.floor(Math.random() * stats.length)];
    this[stat]++;
    if (stat === 'lives') this.initialLives++;
  }

  addPartialRandomStat() {
    const stats = ['speed', 'attack', 'defence', 'lives'];
    const stat = stats[Math.floor(Math.random() * stats.length)];
    this[stat] += 0.1;
    if (stat === 'lives') this.initialLives += 0.1;
  }

  distanceTo(other) {
    const dx = other.x - this.x;
    const dy = other.y - this.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  findNearestDot(dots) {
    let nearest = null, minDist = Infinity;
    for (const dot of dots) {
      const d = this.distanceTo(dot);
      if (d < minDist) { minDist = d; nearest = dot; }
    }
    return { dot: nearest, dist: minDist };
  }

  findNearestBot(bots) {
    let nearest = null, minDist = Infinity;
    for (const bot of bots) {
      if (bot === this) continue;
      const d = this.distanceTo(bot);
      if (d < minDist) { minDist = d; nearest = bot; }
    }
    return { bot: nearest, dist: minDist };
  }

  pickNewTarget(bots, dots) {
    const dotChance = 1 - (this.lives / (this.lives + 3));
    if (Math.random() < dotChance) {
      const { dot } = this.findNearestDot(dots);
      if (dot) { this.targetX = dot.x; this.targetY = dot.y; this.maxIdle = 30 + Math.random() * 60; this.idleTime = 0; return; }
    } else {
      const { bot } = this.findNearestBot(bots);
      if (bot) { this.targetX = bot.x; this.targetY = bot.y; this.maxIdle = 30 + Math.random() * 60; this.idleTime = 0; return; }
    }
    const m = 100;
    this.targetX = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.targetY = m + Math.random() * (WORLD_HEIGHT - m * 2);
    this.maxIdle = 60 + Math.random() * 180;
    this.idleTime = 0;
  }

  update(bots, dots) {
    this.lifetime++;
    if (this.combatCooldown > 0) this.combatCooldown--;
    if (this.damageTimer > 0) { this.damageTimer--; if (this.damageTimer === 0) { this.justTookDamage = false; this.lastAttacker = null; } }
    if (this.damageDealtTimer > 0) { this.damageDealtTimer--; if (this.damageDealtTimer === 0) this.justDealtDamage = false; }

    if (this.combatCooldown === 0 && this.lifetime % 30 === 0) {
      this.pickNewTarget(bots, dots);
    }

    const dx = this.targetX - this.x;
    const dy = this.targetY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 5) {
      this.idleTime++;
      if (this.idleTime > this.maxIdle) this.pickNewTarget(bots, dots);
    } else {
      const moveSpeed = 0.5 + this.speed * 0.2;
      this.x += (dx / dist) * moveSpeed;
      this.y += (dy / dist) * moveSpeed;
      this.angle = Math.atan2(dy, dx);
    }

    this.x = Math.max(20, Math.min(WORLD_WIDTH - 20, this.x));
    this.y = Math.max(20, Math.min(WORLD_HEIGHT - 20, this.y));
  }
}

class GameEngine {
  constructor(options = {}) {
    this.botCount = options.botCount || BOT_COUNT;
    this.dotCount = options.dotCount || DOT_COUNT;
    this.bots = [];
    this.dots = [];
    this.frameCount = 0;
    this.paused = false;
    this.events = [];
    this.playerBot = null;
    this.followedBot = null;
    this.followIndex = 0;
  }

  init() {
    this.dots = [];
    for (let i = 0; i < this.dotCount; i++) this.dots.push(new YellowDot());

    this.bots = [];
    for (let i = 0; i < this.botCount; i++) {
      const bot = new Bot(i, i === 0);
      this.bots.push(bot);
    }
    this.playerBot = this.bots[0];
    this.followedBot = this.playerBot;
    this.followIndex = 0;
    this.frameCount = 0;
  }

  cycleFollowedBot() {
    this.followIndex = (this.followIndex + 1) % this.bots.length;
    this.followedBot = this.bots[this.followIndex];
  }

  update() {
    if (this.paused) return;
    this.events = [];
    this.frameCount++;

    for (const bot of this.bots) bot.update(this.bots, this.dots);
    this._processCollisions();
  }

  _processCollisions() {
    for (const bot of this.bots) {
      for (const dot of this.dots) {
        const dx = bot.x - dot.x, dy = bot.y - dot.y;
        if (Math.sqrt(dx * dx + dy * dy) < bot.size + dot.size) {
          bot.addPartialRandomStat();
          const oldPos = { x: dot.x, y: dot.y };
          dot.respawn();
          this.events.push({ type: 'eat', bot, dotPos: oldPos });
        }
      }
    }

    for (let i = 0; i < this.bots.length; i++) {
      for (let j = i + 1; j < this.bots.length; j++) {
        const b1 = this.bots[i], b2 = this.bots[j];
        const dx = b1.x - b2.x, dy = b1.y - b2.y;
        if (Math.sqrt(dx * dx + dy * dy) < b1.size + b2.size) {
          this._handleCombat(b1, b2);
        }
      }
    }
  }

  _handleCombat(bot1, bot2) {
    if (bot1.combatCooldown > 0 || bot2.combatCooldown > 0) return;

    let damage1 = bot2.attack - bot1.defence;
    let damage2 = bot1.attack - bot2.defence;

    if (damage1 <= 0 && damage2 <= 0) {
      damage1 = bot2.attack / Math.max(bot1.defence, 0.1);
      damage2 = bot1.attack / Math.max(bot2.defence, 0.1);
    } else {
      damage1 = Math.max(0, damage1);
      damage2 = Math.max(0, damage2);
    }

    bot1.lives -= damage1;
    bot2.lives -= damage2;

    if (damage1 > 0) { bot1.justTookDamage = true; bot1.damageTimer = 120; bot1.lastAttacker = bot2; }
    if (damage2 > 0) { bot2.justTookDamage = true; bot2.damageTimer = 120; bot2.lastAttacker = bot1; }
    if (damage2 > 0) { bot1.justDealtDamage = true; bot1.damageDealtTimer = 120; }
    if (damage1 > 0) { bot2.justDealtDamage = true; bot2.damageDealtTimer = 120; }

    bot1.combatCooldown = 60;
    bot2.combatCooldown = 60;

    this.events.push({ type: 'combat', bot1, bot2, damage1, damage2 });

    const b1Dead = bot1.lives <= 0;
    const b2Dead = bot2.lives <= 0;

    if (b1Dead && b2Dead) {
      this._handleDeath(bot1, null);
      this._handleDeath(bot2, null);
    } else if (b1Dead) {
      bot2.killCount++;
      this._handleDeath(bot1, bot2);
      bot2.addRandomStat();
    } else if (b2Dead) {
      bot1.killCount++;
      this._handleDeath(bot2, bot1);
      bot1.addRandomStat();
    }
  }

  _handleDeath(bot, killer) {
    bot.deathCount = (bot.deathCount || 0) + 1;
    this.events.push({ type: 'death', bot, killer, x: bot.x, y: bot.y });
    bot.resetStats();
    bot.spawnAtRandom();
    this.events.push({ type: 'spawn', bot });
  }
}

// =====================================================================
// Three.js Colosseum Scene
// =====================================================================

const ARENA_RADIUS = 75;

function fieldToArena(fieldX, fieldY) {
  return {
    x: (fieldX / WORLD_WIDTH - 0.5) * ARENA_RADIUS * 2,
    z: (fieldY / WORLD_HEIGHT - 0.5) * ARENA_RADIUS * 2
  };
}

// -- Globals --
let scene, camera, renderer, controls;
let engine;
let botMeshes = [];
let dotMeshes = [];
let torchLights = [];
let crowdPoints;
let crowdBaseY = [];
let crowdJumpOffset = [];
let dustParticles = [];
let killFlashes = [];
let killFeed = [];
let startTime = 0;
let frameCount = 0;
let shakeFrames = 0;
let shakeIntensity = 0;

// Camera director state
const CAMERA_TYPES = ['aerial', 'sideline', 'action', 'dramatic', 'crane'];
let directorActive = true;
let currentCamType = 'aerial';
let lockedCamType = null;
let lastSwitchFrame = 0;
let lastUsed = { aerial: 0, sideline: 0, action: 0, dramatic: 0, crane: 0 };
let focusPoint = new THREE.Vector3(0, 0, 0);
let transitioning = false;
let transitionProgress = 0;
let transitionFrom = { pos: new THREE.Vector3(), lookAt: new THREE.Vector3(), fov: 50 };
let transitionTo = { pos: new THREE.Vector3(), lookAt: new THREE.Vector3(), fov: 50 };
let noActionFrames = 0;
let lastCombatFrame = 0;
let lastKillFrame = 0;
let recentKillPos = null;
let orbitOverride = false;

// =====================================================================
// Setup
// =====================================================================

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  document.getElementById('cameraLabel').style.display = 'block';
  document.getElementById('controlsHint').style.display = 'block';
  init();
  animate();
});

function init() {
  engine = new GameEngine();
  engine.init();
  startTime = Date.now();

  // Renderer
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.8;
  document.body.appendChild(renderer.domElement);

  // Scene
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x0a1020, 0.003);

  // Camera
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.5, 500);
  camera.position.set(0, 120, 0);
  camera.lookAt(0, 0, 0);

  // OrbitControls (for manual override)
  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.target.set(0, 0, 0);
  controls.enabled = false; // Disabled by default; director is active

  controls.addEventListener('start', () => {
    if (directorActive) {
      orbitOverride = true;
      directorActive = false;
      updateCameraLabel('[MANUAL]', 'Free Camera');
    }
  });

  // Build scene
  createSkyDome();
  createArena();
  createColumns();
  createCrowd();
  createLighting();
  createBotMeshes();
  createDotMeshes();

  // Input
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('resize', onResize);
}

// =====================================================================
// Scene Construction
// =====================================================================

function createSkyDome() {
  const skyGeo = new THREE.SphereGeometry(250, 32, 32);
  // Invert normals for inside rendering
  skyGeo.scale(-1, 1, 1);

  // Create gradient via vertex colors
  const colors = [];
  const posAttr = skyGeo.attributes.position;
  for (let i = 0; i < posAttr.count; i++) {
    const y = posAttr.getY(i);
    const t = (y + 250) / 500; // 0 at bottom, 1 at top
    // Dark navy at horizon, deeper at top
    const r = 0.04 + t * 0.03;
    const g = 0.06 + t * 0.04;
    const b = 0.15 + t * 0.15;
    colors.push(r, g, b);
  }
  skyGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const skyMat = new THREE.MeshBasicMaterial({
    vertexColors: true,
    side: THREE.BackSide,
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);
}

function createArena() {
  // Sand floor
  const floorGeo = new THREE.CircleGeometry(80, 64);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0xc4a870,
    roughness: 0.95,
    metalness: 0,
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.y = 0;
  floor.receiveShadow = true;
  scene.add(floor);

  // Arena wall
  const wallGeo = new THREE.CylinderGeometry(82, 82, 15, 48, 1, true);
  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x8a7a6a,
    roughness: 0.9,
    metalness: 0.05,
  });
  const wall = new THREE.Mesh(wallGeo, wallMat);
  wall.position.y = 7.5;
  scene.add(wall);

  // Tiered seating - 4 concentric tiers
  for (let i = 0; i < 4; i++) {
    const innerR = 84 + i * 8;
    const outerR = 84 + (i + 1) * 8;
    const height = 4;
    const y = 15 + i * height;

    // Vertical face
    const tierWallGeo = new THREE.CylinderGeometry(outerR, outerR, height, 48, 1, true);
    const tierWallMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.08, 0.1, 0.35 + i * 0.03),
      roughness: 0.9,
    });
    const tierWall = new THREE.Mesh(tierWallGeo, tierWallMat);
    tierWall.position.y = y + height / 2;
    scene.add(tierWall);

    // Flat top
    const topGeo = new THREE.RingGeometry(innerR, outerR, 48);
    const topMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color().setHSL(0.08, 0.08, 0.32 + i * 0.03),
      roughness: 0.9,
    });
    const top = new THREE.Mesh(topGeo, topMat);
    top.rotation.x = -Math.PI / 2;
    top.position.y = y + height;
    top.receiveShadow = true;
    scene.add(top);
  }
}

function createColumns() {
  const colCount = 8;
  for (let i = 0; i < colCount; i++) {
    const angle = (i / colCount) * Math.PI * 2;
    const x = Math.cos(angle) * 83;
    const z = Math.sin(angle) * 83;

    const colGeo = new THREE.CylinderGeometry(0.8, 1.0, 20, 8);
    const colMat = new THREE.MeshStandardMaterial({
      color: 0x6a5a4a,
      roughness: 0.85,
    });
    const col = new THREE.Mesh(colGeo, colMat);
    col.position.set(x, 10, z);
    col.castShadow = true;
    scene.add(col);

    // Torch - small emissive sphere on top
    const torchGeo = new THREE.SphereGeometry(0.6, 8, 8);
    const torchMat = new THREE.MeshStandardMaterial({
      color: 0xff8800,
      emissive: 0xff6600,
      emissiveIntensity: 2,
    });
    const torch = new THREE.Mesh(torchGeo, torchMat);
    torch.position.set(x, 21, z);
    scene.add(torch);

    // Torch PointLight
    const light = new THREE.PointLight(0xff8800, 1.5, 60);
    light.position.set(x, 21, z);
    light.castShadow = true;
    light.shadow.mapSize.set(256, 256);
    light.shadow.camera.near = 0.5;
    light.shadow.camera.far = 40;
    scene.add(light);
    torchLights.push(light);
  }
}

function createCrowd() {
  const positions = [];
  const colors = [];

  for (let tier = 0; tier < 4; tier++) {
    const baseR = 85 + tier * 8;
    const baseY = 16 + tier * 4;
    const count = 150 + tier * 30;

    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.08;
      const r = baseR + Math.random() * 6;
      const y = baseY + Math.random() * 2;
      positions.push(
        Math.cos(angle) * r,
        y,
        Math.sin(angle) * r
      );
      // Random muted clothing colors
      const hue = Math.random();
      const sat = 0.1 + Math.random() * 0.3;
      const lum = 0.3 + Math.random() * 0.25;
      const c = new THREE.Color().setHSL(hue, sat, lum);
      colors.push(c.r, c.g, c.b);

      crowdBaseY.push(y);
      crowdJumpOffset.push(0);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 1.8,
    vertexColors: true,
    sizeAttenuation: true,
  });

  crowdPoints = new THREE.Points(geo, mat);
  scene.add(crowdPoints);
}

function createLighting() {
  // Ambient fill - cool moonlight
  const ambient = new THREE.AmbientLight(0x334466, 0.4);
  scene.add(ambient);

  // Directional "moon" light
  const moon = new THREE.DirectionalLight(0x6688bb, 0.3);
  moon.position.set(30, 80, 20);
  moon.castShadow = true;
  moon.shadow.mapSize.set(1024, 1024);
  moon.shadow.camera.left = -100;
  moon.shadow.camera.right = 100;
  moon.shadow.camera.top = 100;
  moon.shadow.camera.bottom = -100;
  moon.shadow.camera.near = 1;
  moon.shadow.camera.far = 200;
  scene.add(moon);

  // Hemisphere light for subtle sky fill
  const hemi = new THREE.HemisphereLight(0x334466, 0x221100, 0.2);
  scene.add(hemi);
}

function createBotMeshes() {
  botMeshes = [];
  for (const bot of engine.bots) {
    const group = new THREE.Group();

    // Body - slightly tapered cylinder
    const bodyGeo = new THREE.CylinderGeometry(1.8, 1.4, 3, 8);
    const bodyMat = new THREE.MeshStandardMaterial({
      color: bot.colorHex,
      roughness: 0.5,
      metalness: 0.2,
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.5;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(1.0, 12, 8);
    const headMat = new THREE.MeshStandardMaterial({
      color: bot.colorHex,
      roughness: 0.4,
      metalness: 0.15,
    });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 3.8;
    head.castShadow = true;
    group.add(head);

    // Eyes - white with dark pupil
    const eyeWhiteGeo = new THREE.SphereGeometry(0.2, 6, 6);
    const eyeWhiteMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0xffffff,
      emissiveIntensity: 0.3,
    });
    const pupilGeo = new THREE.SphereGeometry(0.1, 6, 6);
    const pupilMat = new THREE.MeshStandardMaterial({
      color: 0x111111,
    });

    [-0.35, 0.35].forEach(xOff => {
      const eyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
      eyeWhite.position.set(xOff, 4.0, 0.85);
      group.add(eyeWhite);

      const pupil = new THREE.Mesh(pupilGeo, pupilMat);
      pupil.position.set(xOff, 4.0, 0.95);
      group.add(pupil);
    });

    // Player bot: gold torus ring at base
    if (bot.isPlayer) {
      const torusGeo = new THREE.TorusGeometry(2.0, 0.2, 8, 24);
      const torusMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xffd700,
        emissiveIntensity: 0.5,
        metalness: 0.8,
        roughness: 0.2,
      });
      const torus = new THREE.Mesh(torusGeo, torusMat);
      torus.rotation.x = Math.PI / 2;
      torus.position.y = 0.15;
      group.add(torus);
    }

    scene.add(group);
    botMeshes.push({
      group,
      body,
      head,
      bodyMat,
      headMat,
      bot,
      prevX: bot.x,
      prevY: bot.y,
      bobPhase: Math.random() * Math.PI * 2,
      scale: 1.0,
      fadeOut: false,
      fadeAlpha: 1.0,
    });
  }
}

function createDotMeshes() {
  dotMeshes = [];
  const dotGeo = new THREE.SphereGeometry(0.8, 12, 12);

  for (const dot of engine.dots) {
    const dotMat = new THREE.MeshStandardMaterial({
      color: 0xffcc00,
      emissive: 0xffaa00,
      emissiveIntensity: 0.8,
      roughness: 0.2,
    });
    const mesh = new THREE.Mesh(dotGeo, dotMat);
    const pos = fieldToArena(dot.x, dot.y);
    mesh.position.set(pos.x, 1.0, pos.z);
    scene.add(mesh);
    dotMeshes.push({ mesh, dot, bobPhase: Math.random() * Math.PI * 2 });
  }
}

// =====================================================================
// Camera System
// =====================================================================

function getCameraPosition(type, focus, time) {
  switch (type) {
    case 'aerial':
      return new THREE.Vector3(0, 120, 0);
    case 'sideline': {
      const angle = Math.atan2(focus.z, focus.x) + Math.PI;
      const r = ARENA_RADIUS + 10;
      return new THREE.Vector3(Math.cos(angle) * r, 6, Math.sin(angle) * r);
    }
    case 'action':
      return new THREE.Vector3(focus.x + 15, focus.y + 8, focus.z + 15);
    case 'dramatic': {
      const a = time * 0.02;
      return new THREE.Vector3(focus.x + Math.cos(a) * 20, 12, focus.z + Math.sin(a) * 20);
    }
    case 'crane': {
      const progress = (time % 300) / 300;
      const a2 = progress * Math.PI;
      return new THREE.Vector3(
        Math.cos(a2) * ARENA_RADIUS * 0.8,
        ARENA_RADIUS * 0.3 + Math.sin(progress * Math.PI) * ARENA_RADIUS * 0.5,
        Math.sin(a2) * ARENA_RADIUS * 0.8
      );
    }
    default:
      return new THREE.Vector3(0, 120, 0);
  }
}

function getCameraLookAt(type, focus) {
  switch (type) {
    case 'aerial':
      return new THREE.Vector3(0, 0, 0);
    case 'sideline':
    case 'action':
      return focus.clone();
    case 'dramatic':
      return focus.clone().add(new THREE.Vector3(0, 3, 0));
    case 'crane':
      return new THREE.Vector3(0, 0, 0);
    default:
      return new THREE.Vector3(0, 0, 0);
  }
}

function getCameraFOV(type) {
  switch (type) {
    case 'aerial': return 50;
    case 'sideline': return 40;
    case 'action': return 35;
    case 'dramatic': return 30;
    case 'crane': return 45;
    default: return 50;
  }
}

function startCameraTransition(toType) {
  const oldType = currentCamType;
  currentCamType = toType;
  lastUsed[toType] = frameCount;
  lastSwitchFrame = frameCount;

  transitionFrom.pos.copy(camera.position);
  // Get current lookAt direction
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  transitionFrom.lookAt.copy(camera.position).add(dir.multiplyScalar(50));
  transitionFrom.fov = camera.fov;

  const newPos = getCameraPosition(toType, focusPoint, frameCount);
  const newLook = getCameraLookAt(toType, focusPoint);
  transitionTo.pos.copy(newPos);
  transitionTo.lookAt.copy(newLook);
  transitionTo.fov = getCameraFOV(toType);

  transitioning = true;
  transitionProgress = 0;

  updateCameraLabel(
    directorActive ? '[AUTO]' : '[MANUAL]',
    CAMERA_NAMES[toType] || toType
  );
}

const CAMERA_NAMES = {
  aerial: 'Aerial',
  sideline: 'Sideline',
  action: 'Action Cam',
  dramatic: 'Dramatic',
  crane: 'Crane',
};

function updateCameraLabel(mode, name) {
  document.getElementById('camMode').textContent = mode;
  document.getElementById('camName').textContent = name;
}

function updateDirector() {
  if (!directorActive) return;
  if (frameCount - lastSwitchFrame < 120) return; // min 2 seconds between switches

  let combatHappening = false;
  let killJustHappened = false;

  for (const evt of engine.events) {
    if (evt.type === 'combat') {
      combatHappening = true;
      lastCombatFrame = frameCount;
      const midX = (evt.bot1.x + evt.bot2.x) / 2;
      const midY = (evt.bot1.y + evt.bot2.y) / 2;
      const pos = fieldToArena(midX, midY);
      focusPoint.set(pos.x, 2, pos.z);
    }
    if (evt.type === 'death') {
      killJustHappened = true;
      lastKillFrame = frameCount;
      const pos = fieldToArena(evt.x, evt.y);
      recentKillPos = new THREE.Vector3(pos.x, 2, pos.z);
      focusPoint.copy(recentKillPos);
    }
  }

  // Evaluate every 60 frames
  if (frameCount % 60 !== 0) return;

  const timeSinceCombat = frameCount - lastCombatFrame;
  const timeSinceKill = frameCount - lastKillFrame;
  const recentKill = timeSinceKill < 180; // 3 sec
  const nothingHappening = timeSinceCombat > 300; // 5 sec

  // Score each camera
  let bestType = currentCamType;
  let bestScore = -Infinity;

  for (const type of CAMERA_TYPES) {
    let score = 0;

    if (combatHappening) {
      if (type === 'action') score += 100;
      if (type === 'sideline') score += 80;
      if (type === 'dramatic') score += 60;
    }

    if (recentKill && recentKillPos) {
      if (type === 'dramatic') score += 110;
    }

    if (!combatHappening && !recentKill) {
      if (type === 'aerial') score += 50;
      if (type === 'crane') score += 70;
    }

    if (nothingHappening) {
      if (type === 'aerial') score += 40;
      if (type === 'crane') score += 60;
    }

    // Variety bonus
    const timeSinceUsed = frameCount - lastUsed[type];
    score += Math.min(timeSinceUsed * 0.1, 20);

    // Avoid switching too fast (already handled above but extra penalty)
    if (type === currentCamType) score -= 10;

    if (score > bestScore) {
      bestScore = score;
      bestType = type;
    }
  }

  if (bestType !== currentCamType) {
    // If action/sideline/dramatic, update focus to followed bot if no combat
    if (!combatHappening && !recentKill && engine.followedBot) {
      const pos = fieldToArena(engine.followedBot.x, engine.followedBot.y);
      focusPoint.set(pos.x, 2, pos.z);
    }
    startCameraTransition(bestType);
  }
}

function updateCamera() {
  if (orbitOverride) {
    controls.enabled = true;
    controls.update();
    return;
  }

  controls.enabled = false;

  if (transitioning) {
    transitionProgress += 1 / 30; // 30 frames = 0.5s
    if (transitionProgress >= 1) {
      transitionProgress = 1;
      transitioning = false;
    }

    const t = transitionProgress < 0.5
      ? 2 * transitionProgress * transitionProgress
      : 1 - Math.pow(-2 * transitionProgress + 2, 2) / 2;

    camera.position.lerpVectors(transitionFrom.pos, transitionTo.pos, t);
    const lookTarget = new THREE.Vector3().lerpVectors(transitionFrom.lookAt, transitionTo.lookAt, t);
    camera.lookAt(lookTarget);
    camera.fov = transitionFrom.fov + (transitionTo.fov - transitionFrom.fov) * t;
    camera.updateProjectionMatrix();
  } else {
    // Continuously update position for dynamic cameras
    const pos = getCameraPosition(currentCamType, focusPoint, frameCount);
    const look = getCameraLookAt(currentCamType, focusPoint);

    // Smooth follow
    camera.position.lerp(pos, 0.05);
    const currentLook = new THREE.Vector3();
    camera.getWorldDirection(currentLook);
    currentLook.multiplyScalar(50).add(camera.position);
    currentLook.lerp(look, 0.05);
    camera.lookAt(currentLook);

    const targetFov = getCameraFOV(currentCamType);
    if (Math.abs(camera.fov - targetFov) > 0.1) {
      camera.fov += (targetFov - camera.fov) * 0.05;
      camera.updateProjectionMatrix();
    }
  }

  // Screen shake
  if (shakeFrames > 0) {
    camera.position.x += (Math.random() - 0.5) * shakeIntensity;
    camera.position.y += (Math.random() - 0.5) * shakeIntensity;
    camera.position.z += (Math.random() - 0.5) * shakeIntensity;
    shakeFrames--;
  }
}

// =====================================================================
// Effects
// =====================================================================

function spawnDustParticles(worldX, worldZ) {
  const count = 20;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.15 + Math.random() * 0.15, 4, 4);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xc4a870,
      transparent: true,
      opacity: 0.8,
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      worldX + (Math.random() - 0.5) * 3,
      0.5 + Math.random() * 0.5,
      worldZ + (Math.random() - 0.5) * 3
    );
    scene.add(mesh);
    dustParticles.push({
      mesh,
      vx: (Math.random() - 0.5) * 0.3,
      vy: 0.1 + Math.random() * 0.2,
      vz: (Math.random() - 0.5) * 0.3,
      life: 40 + Math.random() * 20,
      maxLife: 60,
      mat,
    });
  }
}

function spawnKillFlash(worldX, worldZ) {
  const light = new THREE.PointLight(0xffffff, 5, 40);
  light.position.set(worldX, 5, worldZ);
  scene.add(light);
  killFlashes.push({ light, life: 30 });
}

function updateEffects() {
  // Dust particles
  for (let i = dustParticles.length - 1; i >= 0; i--) {
    const p = dustParticles[i];
    p.mesh.position.x += p.vx;
    p.mesh.position.y += p.vy;
    p.mesh.position.z += p.vz;
    p.vy -= 0.003;
    p.life--;
    p.mat.opacity = Math.max(0, p.life / p.maxLife);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mat.dispose();
      dustParticles.splice(i, 1);
    }
  }

  // Kill flashes
  for (let i = killFlashes.length - 1; i >= 0; i--) {
    const f = killFlashes[i];
    f.life--;
    f.light.intensity = 5 * (f.life / 30);
    if (f.life <= 0) {
      scene.remove(f.light);
      killFlashes.splice(i, 1);
    }
  }
}

// =====================================================================
// Crowd Reactions
// =====================================================================

function crowdReact(eventType, arenaPos) {
  if (!crowdPoints) return;
  const positions = crowdPoints.geometry.attributes.position;

  if (eventType === 'kill') {
    for (let i = 0; i < crowdJumpOffset.length; i++) {
      crowdJumpOffset[i] = 1.5;
    }
  } else if (eventType === 'combat' && arenaPos) {
    for (let i = 0; i < crowdJumpOffset.length; i++) {
      const px = positions.getX(i);
      const pz = positions.getZ(i);
      const dist = Math.sqrt((px - arenaPos.x) ** 2 + (pz - arenaPos.z) ** 2);
      if (dist < 40) {
        crowdJumpOffset[i] = Math.max(crowdJumpOffset[i], 1.0 * (1 - dist / 40));
      }
    }
  }
}

function updateCrowd() {
  if (!crowdPoints) return;
  const positions = crowdPoints.geometry.attributes.position;
  const colors = crowdPoints.geometry.attributes.color;

  for (let i = 0; i < crowdJumpOffset.length; i++) {
    // Decay
    crowdJumpOffset[i] *= 0.92;
    if (crowdJumpOffset[i] < 0.01) crowdJumpOffset[i] = 0;

    // Idle jitter
    const idleJitter = (frameCount - lastCombatFrame > 600)
      ? Math.sin(frameCount * 0.02 + i * 1.7) * 0.15
      : 0;

    positions.setY(i, crowdBaseY[i] + crowdJumpOffset[i] + idleJitter);

    // Flash white on kill briefly
    if (crowdJumpOffset[i] > 1.0) {
      colors.setXYZ(i, 1, 1, 1);
    }
  }
  positions.needsUpdate = true;
  colors.needsUpdate = true;
}

// =====================================================================
// HUD
// =====================================================================

function updateHUD() {
  const player = engine.playerBot;
  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const mm = Math.floor(elapsed / 60).toString().padStart(1, '0');
  const ss = (elapsed % 60).toString().padStart(2, '0');

  document.getElementById('playerStats').innerHTML =
    `<span class="star">&#9733;</span> Player Bot | ` +
    `<span class="stat">SPD</span> <span class="stat-val">${player.speed.toFixed(1)}</span> ` +
    `<span class="stat">ATK</span> <span class="stat-val">${player.attack.toFixed(1)}</span> ` +
    `<span class="stat">DEF</span> <span class="stat-val">${player.defence.toFixed(1)}</span> ` +
    `<span class="stat">LIV</span> <span class="stat-val">${player.lives.toFixed(1)}</span> | ` +
    `K:${player.killCount} D:${player.deathCount || 0}`;

  document.getElementById('popLine').innerHTML =
    `Population: ${engine.bots.length}/${BOT_COUNT} | ` +
    `&#9201; ${mm}:${ss}`;

  // Kill feed
  const feedEl = document.getElementById('killFeed');
  let feedHTML = '';
  const now = Date.now();
  const recent = killFeed.slice(-5).reverse();
  for (const entry of recent) {
    const agoSec = Math.floor((now - entry.time) / 1000);
    const agoMin = Math.floor(agoSec / 60);
    const agoS = (agoSec % 60).toString().padStart(2, '0');

    const killerName = entry.killer
      ? (entry.killer.isPlayer
        ? `<span class="player-name">&#9733;Player</span>`
        : `Bot#${entry.killer.index}`)
      : '???';
    const victimName = entry.victim.isPlayer
      ? `<span class="player-name">&#9733;Player</span>`
      : `Bot#${entry.victim.index}`;

    feedHTML += `<div class="kill-entry">` +
      `<span class="sword">&#9876;</span> ${killerName} &rarr; ${victimName}` +
      `<span class="time">${agoMin}:${agoS} ago</span></div>`;
  }
  feedEl.innerHTML = feedHTML;
}

// =====================================================================
// Game Events Processing
// =====================================================================

function processEvents() {
  for (const evt of engine.events) {
    if (evt.type === 'combat') {
      const midX = (evt.bot1.x + evt.bot2.x) / 2;
      const midY = (evt.bot1.y + evt.bot2.y) / 2;
      const pos = fieldToArena(midX, midY);
      spawnDustParticles(pos.x, pos.z);
      crowdReact('combat', pos);
      lastCombatFrame = frameCount;
    }

    if (evt.type === 'death') {
      const pos = fieldToArena(evt.x, evt.y);
      spawnKillFlash(pos.x, pos.z);
      crowdReact('kill', null);
      lastKillFrame = frameCount;
      shakeFrames = 8;
      shakeIntensity = 0.5;

      killFeed.push({
        killer: evt.killer,
        victim: evt.bot,
        time: Date.now(),
      });
      // Keep only last 20
      if (killFeed.length > 20) killFeed.shift();
    }
  }
}

// =====================================================================
// Update Loop
// =====================================================================

function updateBotMeshes() {
  for (const bm of botMeshes) {
    const bot = bm.bot;
    const pos = fieldToArena(bot.x, bot.y);

    // Height scales with totalStats
    const height = 3 + bot.totalStats * 0.1;
    const scale = height / 3;

    bm.group.position.x = pos.x;
    bm.group.position.z = pos.z;

    // Bob animation while moving
    const dx = bot.x - bm.prevX;
    const dy = bot.y - bm.prevY;
    const speed = Math.sqrt(dx * dx + dy * dy);
    bm.prevX = bot.x;
    bm.prevY = bot.y;

    if (speed > 0.1) {
      bm.bobPhase += 0.15;
      const bob = Math.sin(bm.bobPhase) * 0.3;
      bm.group.position.y = bob;

      // Lean in movement direction
      const lean = Math.min(speed * 0.05, 0.15);
      bm.group.rotation.z = -Math.sin(bot.angle) * lean;
      bm.group.rotation.x = Math.cos(bot.angle) * lean;
    } else {
      bm.group.position.y *= 0.9;
      bm.group.rotation.z *= 0.9;
      bm.group.rotation.x *= 0.9;
    }

    // Face movement direction
    bm.group.rotation.y = -bot.angle + Math.PI / 2;

    // Scale
    bm.group.scale.set(1, scale, 1);

    // Damage flash
    if (bot.justTookDamage) {
      bm.bodyMat.emissive.setHex(0xff0000);
      bm.bodyMat.emissiveIntensity = 0.5;
      bm.headMat.emissive.setHex(0xff0000);
      bm.headMat.emissiveIntensity = 0.5;
    } else {
      bm.bodyMat.emissive.setHex(0x000000);
      bm.bodyMat.emissiveIntensity = 0;
      bm.headMat.emissive.setHex(0x000000);
      bm.headMat.emissiveIntensity = 0;
    }
  }
}

function updateDotMeshes() {
  for (const dm of dotMeshes) {
    const pos = fieldToArena(dm.dot.x, dm.dot.y);
    dm.mesh.position.x = pos.x;
    dm.mesh.position.z = pos.z;

    // Hover bob
    dm.bobPhase += 0.03;
    dm.mesh.position.y = 1.0 + Math.sin(dm.bobPhase) * 0.3;
  }
}

function updateTorches() {
  for (const light of torchLights) {
    light.intensity = 1.2 + Math.random() * 0.6;
  }
}

// =====================================================================
// Input
// =====================================================================

function onKeyDown(e) {
  const key = e.key;

  if (key >= '1' && key <= '5') {
    const idx = parseInt(key) - 1;
    const type = CAMERA_TYPES[idx];
    directorActive = false;
    orbitOverride = false;
    lockedCamType = type;

    // For action cam, focus on followed bot
    if (type === 'action' && engine.followedBot) {
      const pos = fieldToArena(engine.followedBot.x, engine.followedBot.y);
      focusPoint.set(pos.x, 2, pos.z);
    }

    startCameraTransition(type);
    updateCameraLabel('[MANUAL]', CAMERA_NAMES[type]);
    e.preventDefault();
  }

  if (key === '0') {
    directorActive = true;
    orbitOverride = false;
    lockedCamType = null;
    updateCameraLabel('[AUTO]', CAMERA_NAMES[currentCamType]);
    e.preventDefault();
  }

  if (key === 'Tab') {
    engine.cycleFollowedBot();
    // If in action cam, update focus
    if (currentCamType === 'action' || lockedCamType === 'action') {
      const pos = fieldToArena(engine.followedBot.x, engine.followedBot.y);
      focusPoint.set(pos.x, 2, pos.z);
    }
    e.preventDefault();
  }

  if (key === ' ') {
    engine.paused = !engine.paused;
    e.preventDefault();
  }

  if (key === 'Escape') {
    directorActive = true;
    orbitOverride = false;
    lockedCamType = null;
    controls.enabled = false;
    updateCameraLabel('[AUTO]', CAMERA_NAMES[currentCamType]);
    e.preventDefault();
  }
}

function onResize() {
  if (!camera || !renderer) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// =====================================================================
// Main Animation Loop
// =====================================================================

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  // Update game engine
  engine.update();

  // Process events from engine
  processEvents();

  // Update focus point for locked cameras that follow bots
  if (!directorActive && lockedCamType === 'action' && engine.followedBot) {
    const pos = fieldToArena(engine.followedBot.x, engine.followedBot.y);
    focusPoint.set(pos.x, 2, pos.z);
  }

  // Director AI
  updateDirector();

  // Update 3D objects
  updateBotMeshes();
  updateDotMeshes();
  updateTorches();
  updateEffects();
  updateCrowd();

  // Camera
  updateCamera();

  // HUD (every 10 frames to reduce DOM thrashing)
  if (frameCount % 10 === 0) {
    updateHUD();
  }

  // Render
  renderer.render(scene, camera);
}
</script>
