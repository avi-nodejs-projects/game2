<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital - Bots in a Field 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; }
  canvas { display: block; }

  /* Setup Screen */
  #setup-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, #0a0a2a 0%, #000010 100%);
    z-index: 100;
  }
  .setup-card {
    text-align: center;
    padding: 60px 80px;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
  }
  .setup-card h1 {
    font-size: 52px;
    font-weight: 200;
    letter-spacing: 12px;
    text-transform: uppercase;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #88ccff, #ffffff, #88ccff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .setup-card .subtitle {
    font-size: 14px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 48px;
  }
  .start-btn {
    padding: 14px 48px;
    font-size: 16px;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: 1px solid rgba(136,204,255,0.4);
    background: rgba(136,204,255,0.08);
    color: #88ccff;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
  }
  .start-btn:hover {
    background: rgba(136,204,255,0.2);
    border-color: rgba(136,204,255,0.7);
    box-shadow: 0 0 30px rgba(136,204,255,0.15);
  }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 10px 20px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    font-size: 14px;
    letter-spacing: 1px;
    display: none;
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #hud .hud-inner {
    display: flex;
    align-items: center;
    gap: 20px;
    justify-content: center;
  }
  #hud .stat { color: rgba(255,255,255,0.7); }
  #hud .stat-val { color: #fff; font-weight: 600; }
  #hud .player-marker { color: #ffd700; font-size: 16px; }
  #hud .separator { color: rgba(255,255,255,0.15); }

  /* Pause overlay */
  #pause-overlay {
    position: fixed; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.4);
    z-index: 50;
    pointer-events: none;
  }
  #pause-overlay span {
    font-size: 32px;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
  }

  /* Controls hint */
  #controls-hint {
    position: fixed;
    bottom: 16px; right: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-align: right;
    line-height: 1.7;
    display: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-card">
    <h1>Orbital</h1>
    <div class="subtitle">Bots in a Field &mdash; 3D</div>
    <button class="start-btn" id="start-btn">Start Simulation</button>
  </div>
</div>

<div id="hud">
  <div class="hud-inner">
    <span class="player-marker">&#9733;</span>
    <span id="hud-bot-name">Player Bot</span>
    <span class="separator">|</span>
    <span class="stat">SPD <span class="stat-val" id="hud-spd">5.0</span></span>
    <span class="stat">ATK <span class="stat-val" id="hud-atk">5.0</span></span>
    <span class="stat">DEF <span class="stat-val" id="hud-def">5.0</span></span>
    <span class="stat">LIV <span class="stat-val" id="hud-liv">3.0</span></span>
    <span class="separator">|</span>
    <span class="stat">Kills: <span class="stat-val" id="hud-kills">0</span></span>
    <span class="separator">|</span>
    <span class="stat">Pop: <span class="stat-val" id="hud-pop">20/20</span></span>
    <span class="separator">|</span>
    <span class="stat" id="hud-time">0:00</span>
  </div>
</div>

<div id="pause-overlay"><span>Paused</span></div>

<div id="controls-hint">
  Drag: orbit &middot; Scroll: zoom<br>
  TAB: cycle bot &middot; F: follow bot<br>
  A: auto-rotate &middot; SPACE: pause
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<!-- Game Engine (inline) -->
<script>
// Shared Game Engine for 3D Map Concepts
// Extracted from v11 — pure game logic, no rendering dependencies

const WORLD_WIDTH = 2000;
const WORLD_HEIGHT = 2000;
const BOT_COUNT = 20;
const DOT_COUNT = 50;
const STARTING_STATS = { speed: 5, attack: 5, defence: 5, lives: 3 };
const TOTAL_POINTS = 18;

class YellowDot {
  constructor() {
    this.size = 6;
    this.respawn();
  }
  respawn() {
    const m = 50;
    this.x = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.y = m + Math.random() * (WORLD_HEIGHT - m * 2);
  }
}

class Bot {
  constructor(index, isPlayer = false) {
    this.index = index;
    this.isPlayer = isPlayer;
    this.size = 10 + Math.random() * 6;
    this.hue = isPlayer ? 200 : Math.random() * 360;
    this.color = `hsl(${this.hue}, 70%, 50%)`;
    this.colorHex = this._hslToHex(this.hue, 70, 50);
    this.killCount = 0;
    this.combatCooldown = 0;
    this.idleTime = 0;
    this.maxIdle = 60 + Math.random() * 120;
    this.angle = 0;
    this.lifetime = 0;
    this.justTookDamage = false;
    this.justDealtDamage = false;
    this.damageTimer = 0;
    this.damageDealtTimer = 0;
    this.lastAttacker = null;

    this.speed = isPlayer ? STARTING_STATS.speed : STARTING_STATS.speed;
    this.attack = isPlayer ? STARTING_STATS.attack : STARTING_STATS.attack;
    this.defence = isPlayer ? STARTING_STATS.defence : STARTING_STATS.defence;
    this.lives = isPlayer ? STARTING_STATS.lives : STARTING_STATS.lives;
    this.initialLives = this.lives;

    this.spawnAtRandom();
  }

  _hslToHex(h, s, l) {
    s /= 100; l /= 100;
    const a = s * Math.min(l, 1 - l);
    const f = n => { const k = (n + h / 30) % 12; return l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1); };
    return (Math.round(f(0) * 255) << 16) | (Math.round(f(8) * 255) << 8) | Math.round(f(4) * 255);
  }

  get totalStats() { return this.speed + this.attack + this.defence + this.lives; }

  spawnAtRandom() {
    const m = 100;
    this.x = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.y = m + Math.random() * (WORLD_HEIGHT - m * 2);
    this.targetX = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.targetY = m + Math.random() * (WORLD_HEIGHT - m * 2);
    this.idleTime = 0;
    this.maxIdle = 60 + Math.random() * 120;
    this.combatCooldown = 0;
  }

  resetStats() {
    this.speed = STARTING_STATS.speed;
    this.attack = STARTING_STATS.attack;
    this.defence = STARTING_STATS.defence;
    this.lives = STARTING_STATS.lives;
    this.initialLives = this.lives;
  }

  addRandomStat() {
    const stats = ['speed', 'attack', 'defence', 'lives'];
    const stat = stats[Math.floor(Math.random() * stats.length)];
    this[stat]++;
    if (stat === 'lives') this.initialLives++;
  }

  addPartialRandomStat() {
    const stats = ['speed', 'attack', 'defence', 'lives'];
    const stat = stats[Math.floor(Math.random() * stats.length)];
    this[stat] += 0.1;
    if (stat === 'lives') this.initialLives += 0.1;
  }

  distanceTo(other) {
    const dx = other.x - this.x;
    const dy = other.y - this.y;
    return Math.sqrt(dx * dx + dy * dy);
  }

  findNearestDot(dots) {
    let nearest = null, minDist = Infinity;
    for (const dot of dots) {
      const d = this.distanceTo(dot);
      if (d < minDist) { minDist = d; nearest = dot; }
    }
    return { dot: nearest, dist: minDist };
  }

  findNearestBot(bots) {
    let nearest = null, minDist = Infinity;
    for (const bot of bots) {
      if (bot === this) continue;
      const d = this.distanceTo(bot);
      if (d < minDist) { minDist = d; nearest = bot; }
    }
    return { bot: nearest, dist: minDist };
  }

  pickNewTarget(bots, dots) {
    const dotChance = 1 - (this.lives / (this.lives + 3));
    if (Math.random() < dotChance) {
      const { dot } = this.findNearestDot(dots);
      if (dot) { this.targetX = dot.x; this.targetY = dot.y; this.maxIdle = 30 + Math.random() * 60; this.idleTime = 0; return; }
    } else {
      const { bot } = this.findNearestBot(bots);
      if (bot) { this.targetX = bot.x; this.targetY = bot.y; this.maxIdle = 30 + Math.random() * 60; this.idleTime = 0; return; }
    }
    const m = 100;
    this.targetX = m + Math.random() * (WORLD_WIDTH - m * 2);
    this.targetY = m + Math.random() * (WORLD_HEIGHT - m * 2);
    this.maxIdle = 60 + Math.random() * 180;
    this.idleTime = 0;
  }

  update(bots, dots) {
    this.lifetime++;
    if (this.combatCooldown > 0) this.combatCooldown--;
    if (this.damageTimer > 0) { this.damageTimer--; if (this.damageTimer === 0) { this.justTookDamage = false; this.lastAttacker = null; } }
    if (this.damageDealtTimer > 0) { this.damageDealtTimer--; if (this.damageDealtTimer === 0) this.justDealtDamage = false; }

    // Re-evaluate target periodically
    if (this.combatCooldown === 0 && this.lifetime % 30 === 0) {
      this.pickNewTarget(bots, dots);
    }

    const dx = this.targetX - this.x;
    const dy = this.targetY - this.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 5) {
      this.idleTime++;
      if (this.idleTime > this.maxIdle) this.pickNewTarget(bots, dots);
    } else {
      const moveSpeed = 0.5 + this.speed * 0.2;
      this.x += (dx / dist) * moveSpeed;
      this.y += (dy / dist) * moveSpeed;
      this.angle = Math.atan2(dy, dx);
    }

    this.x = Math.max(20, Math.min(WORLD_WIDTH - 20, this.x));
    this.y = Math.max(20, Math.min(WORLD_HEIGHT - 20, this.y));
  }
}

class GameEngine {
  constructor(options = {}) {
    this.botCount = options.botCount || BOT_COUNT;
    this.dotCount = options.dotCount || DOT_COUNT;
    this.bots = [];
    this.dots = [];
    this.frameCount = 0;
    this.paused = false;
    this.events = [];
    this.playerBot = null;
    this.followedBot = null;
    this.followIndex = 0;
  }

  init() {
    this.dots = [];
    for (let i = 0; i < this.dotCount; i++) this.dots.push(new YellowDot());

    this.bots = [];
    for (let i = 0; i < this.botCount; i++) {
      const bot = new Bot(i, i === 0);
      this.bots.push(bot);
    }
    this.playerBot = this.bots[0];
    this.followedBot = this.playerBot;
    this.followIndex = 0;
    this.frameCount = 0;
  }

  cycleFollowedBot() {
    this.followIndex = (this.followIndex + 1) % this.bots.length;
    this.followedBot = this.bots[this.followIndex];
  }

  update() {
    if (this.paused) return;
    this.events = [];
    this.frameCount++;

    for (const bot of this.bots) bot.update(this.bots, this.dots);
    this._processCollisions();
  }

  _processCollisions() {
    // Bot-Dot
    for (const bot of this.bots) {
      for (const dot of this.dots) {
        const dx = bot.x - dot.x, dy = bot.y - dot.y;
        if (Math.sqrt(dx * dx + dy * dy) < bot.size + dot.size) {
          bot.addPartialRandomStat();
          const oldPos = { x: dot.x, y: dot.y };
          dot.respawn();
          this.events.push({ type: 'eat', bot, dotPos: oldPos });
        }
      }
    }

    // Bot-Bot
    for (let i = 0; i < this.bots.length; i++) {
      for (let j = i + 1; j < this.bots.length; j++) {
        const b1 = this.bots[i], b2 = this.bots[j];
        const dx = b1.x - b2.x, dy = b1.y - b2.y;
        if (Math.sqrt(dx * dx + dy * dy) < b1.size + b2.size) {
          this._handleCombat(b1, b2);
        }
      }
    }
  }

  _handleCombat(bot1, bot2) {
    if (bot1.combatCooldown > 0 || bot2.combatCooldown > 0) return;

    let damage1 = bot2.attack - bot1.defence;
    let damage2 = bot1.attack - bot2.defence;

    if (damage1 <= 0 && damage2 <= 0) {
      damage1 = bot2.attack / Math.max(bot1.defence, 0.1);
      damage2 = bot1.attack / Math.max(bot2.defence, 0.1);
    } else {
      damage1 = Math.max(0, damage1);
      damage2 = Math.max(0, damage2);
    }

    bot1.lives -= damage1;
    bot2.lives -= damage2;

    if (damage1 > 0) { bot1.justTookDamage = true; bot1.damageTimer = 120; bot1.lastAttacker = bot2; }
    if (damage2 > 0) { bot2.justTookDamage = true; bot2.damageTimer = 120; bot2.lastAttacker = bot1; }
    if (damage2 > 0) { bot1.justDealtDamage = true; bot1.damageDealtTimer = 120; }
    if (damage1 > 0) { bot2.justDealtDamage = true; bot2.damageDealtTimer = 120; }

    bot1.combatCooldown = 60;
    bot2.combatCooldown = 60;

    this.events.push({ type: 'combat', bot1, bot2, damage1, damage2 });

    const b1Dead = bot1.lives <= 0;
    const b2Dead = bot2.lives <= 0;

    if (b1Dead && b2Dead) {
      this._handleDeath(bot1, null);
      this._handleDeath(bot2, null);
    } else if (b1Dead) {
      bot2.killCount++;
      this._handleDeath(bot1, bot2);
      bot2.addRandomStat();
    } else if (b2Dead) {
      bot1.killCount++;
      this._handleDeath(bot2, bot1);
      bot1.addRandomStat();
    }
  }

  _handleDeath(bot, killer) {
    this.events.push({ type: 'death', bot, killer, x: bot.x, y: bot.y });
    bot.resetStats();
    bot.spawnAtRandom();
    this.events.push({ type: 'spawn', bot });
  }
}
</script>

<!-- Orbital Scene -->
<script>
(function() {
  'use strict';

  const PLANET_RADIUS = 100;
  const ATMOSPHERE_RADIUS = 104;

  // ---- Coordinate Mapping ----
  function fieldToSphere(fieldX, fieldY, radius) {
    const lon = (fieldX / WORLD_WIDTH) * Math.PI * 2 - Math.PI;
    const lat = (fieldY / WORLD_HEIGHT) * Math.PI * 0.8 - Math.PI * 0.4;
    const x = radius * Math.cos(lat) * Math.cos(lon);
    const y = radius * Math.sin(lat);
    const z = radius * Math.cos(lat) * Math.sin(lon);
    return new THREE.Vector3(x, y, z);
  }

  // ---- Simple 3D Noise for terrain ----
  function hash3(x, y, z) {
    let n = Math.sin(x * 127.1 + y * 311.7 + z * 74.7) * 43758.5453;
    return n - Math.floor(n);
  }
  function smoothNoise3(x, y, z) {
    const ix = Math.floor(x), iy = Math.floor(y), iz = Math.floor(z);
    const fx = x - ix, fy = y - iy, fz = z - iz;
    const ux = fx * fx * (3 - 2 * fx), uy = fy * fy * (3 - 2 * fy), uz = fz * fz * (3 - 2 * fz);
    const a = hash3(ix, iy, iz), b = hash3(ix+1, iy, iz);
    const c = hash3(ix, iy+1, iz), d = hash3(ix+1, iy+1, iz);
    const e = hash3(ix, iy, iz+1), f = hash3(ix+1, iy, iz+1);
    const g = hash3(ix, iy+1, iz+1), h = hash3(ix+1, iy+1, iz+1);
    const v1 = a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
    const v2 = e + (f-e)*ux + (g-e)*uy + (e-f-g+h)*ux*uy;
    return v1 + (v2-v1)*uz;
  }
  function noise3D(x, y, z) {
    return smoothNoise3(x, y, z) * 2 - 1; // range -1..1
  }

  // ---- State ----
  let engine, scene, camera, renderer, controls;
  let botMeshes = [];   // { group, body, nose, ring }
  let dotMeshes = [];   // { mesh }
  let combatFlashes = [];   // { light, frames }
  let deathAnims = [];      // { botIndex, shrinkFrames, pos }
  let spawnAnims = [];      // { botIndex, growFrames }
  let eatParticles = [];    // { points, frames }
  let craterMeshes = [];
  let followMode = false;
  let autoRotate = false;
  let startTime = 0;
  let started = false;

  // ---- Setup Screen ----
  document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    document.getElementById('controls-hint').style.display = 'block';
    startGame();
  });

  function startGame() {
    if (started) return;
    started = true;
    startTime = performance.now();

    engine = new GameEngine();
    engine.init();

    initScene();
    initPlanet();
    initAtmosphere();
    initStarfield();
    initLights();
    initBots();
    initDots();

    animate();
  }

  // ---- Scene Init ----
  function initScene() {
    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 5000);
    camera.position.set(0, 80, 280);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enablePan = false;
    controls.minDistance = PLANET_RADIUS * 1.3;
    controls.maxDistance = PLANET_RADIUS * 5;
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.rotateSpeed = 0.6;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 0.5;

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }

  // ---- Planet ----
  function initPlanet() {
    const geo = new THREE.SphereGeometry(PLANET_RADIUS, 64, 64);
    const positions = geo.attributes.position;
    const normals = geo.attributes.normal;
    const colors = new Float32Array(positions.count * 3);

    for (let i = 0; i < positions.count; i++) {
      const x = positions.getX(i);
      const y = positions.getY(i);
      const z = positions.getZ(i);

      // Terrain displacement
      const noiseVal =
        noise3D(x * 0.02, y * 0.02, z * 0.02) * 2.0 +
        noise3D(x * 0.05, y * 0.05, z * 0.05) * 0.8;
      const maxHeight = PLANET_RADIUS * 0.03;
      const disp = noiseVal * maxHeight;

      const nx = normals.getX(i);
      const ny = normals.getY(i);
      const nz = normals.getZ(i);

      positions.setXYZ(i, x + nx * disp, y + ny * disp, z + nz * disp);

      // Vertex color: biome variation
      const lat = Math.asin(y / PLANET_RADIUS);
      const latFactor = Math.abs(lat) / (Math.PI * 0.5); // 0 at equator, 1 at poles
      const slopeFactor = 1 - Math.abs(ny); // steeper = more rock

      // Base green
      let r = 0.22, g = 0.48, b = 0.16;

      // Poles: cooler, lighter green fading to blue
      if (latFactor > 0.6) {
        const pf = (latFactor - 0.6) / 0.4;
        r = r + (0.1 - r) * pf * 0.5;
        g = g + (0.29 - g) * pf * 0.5;
        b = b + (0.54 - b) * pf * 0.5;
      }

      // Highland variation from noise
      const heightColor = Math.max(0, noiseVal * 0.15);
      r += heightColor * 0.3;
      g += heightColor * 0.15;
      b += heightColor * 0.05;

      // Rock on steep slopes
      if (slopeFactor > 0.4) {
        const rf = (slopeFactor - 0.4) / 0.6;
        r = r + (0.42 - r) * rf * 0.6;
        g = g + (0.42 - g) * rf * 0.6;
        b = b + (0.35 - b) * rf * 0.6;
      }

      colors[i * 3] = Math.max(0, Math.min(1, r));
      colors[i * 3 + 1] = Math.max(0, Math.min(1, g));
      colors[i * 3 + 2] = Math.max(0, Math.min(1, b));
    }

    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.computeVertexNormals();

    const mat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      roughness: 0.85,
      metalness: 0.0,
    });

    const planet = new THREE.Mesh(geo, mat);
    scene.add(planet);
  }

  // ---- Atmosphere with Fresnel ----
  function initAtmosphere() {
    const atmosGeo = new THREE.SphereGeometry(ATMOSPHERE_RADIUS, 64, 64);
    const atmosMat = new THREE.ShaderMaterial({
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vec4 worldPos = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPos.xyz;
          gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
      `,
      fragmentShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPosition;
        uniform vec3 cameraPos;
        void main() {
          vec3 viewDir = normalize(cameraPos - vWorldPosition);
          float fresnel = pow(1.0 - max(dot(vNormal, viewDir), 0.0), 3.0);
          gl_FragColor = vec4(0.533, 0.8, 1.0, fresnel * 0.35);
        }
      `,
      uniforms: {
        cameraPos: { value: new THREE.Vector3() }
      },
      transparent: true,
      side: THREE.BackSide,
      depthWrite: false,
    });
    const atmosphere = new THREE.Mesh(atmosGeo, atmosMat);
    atmosphere.name = 'atmosphere';
    scene.add(atmosphere);
  }

  // ---- Starfield ----
  function initStarfield() {
    const starCount = 1000;
    const starGeo = new THREE.BufferGeometry();
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);

    for (let i = 0; i < starCount; i++) {
      // Random position in a large sphere
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 800 + Math.random() * 1200;
      starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      starPositions[i * 3 + 2] = r * Math.cos(phi);
      starSizes[i] = 0.5 + Math.random() * 2.0;
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

    const starMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 1.5,
      sizeAttenuation: false,
      transparent: true,
      opacity: 0.8,
    });

    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);
  }

  // ---- Lights ----
  function initLights() {
    const sunLight = new THREE.DirectionalLight(0xfff8e0, 1.5);
    sunLight.position.set(200, 100, 60);
    scene.add(sunLight);

    const ambient = new THREE.AmbientLight(0x404060, 0.3);
    scene.add(ambient);
  }

  // ---- Bots ----
  function createBotGroup(bot) {
    const group = new THREE.Group();

    // Hemisphere body
    const bodyRadius = 1.5 + bot.totalStats * 0.05;
    const bodyGeo = new THREE.SphereGeometry(bodyRadius, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const bodyMat = new THREE.MeshStandardMaterial({
      color: bot.colorHex,
      emissive: bot.colorHex,
      emissiveIntensity: 0.2,
      roughness: 0.5,
      metalness: 0.15,
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    group.add(body);

    // Direction cone
    const noseGeo = new THREE.ConeGeometry(0.4, 1.2, 6);
    const noseMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: bot.colorHex,
      emissiveIntensity: 0.3,
    });
    const nose = new THREE.Mesh(noseGeo, noseMat);
    nose.rotation.x = Math.PI / 2;
    nose.position.set(0, bodyRadius * 0.3, bodyRadius + 0.4);
    group.add(nose);

    // Player ring
    let ring = null;
    if (bot.isPlayer) {
      const ringGeo = new THREE.TorusGeometry(bodyRadius + 0.5, 0.2, 8, 24);
      const ringMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xffd700,
        emissiveIntensity: 0.5,
        metalness: 0.8,
        roughness: 0.2,
      });
      ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = bodyRadius * 0.2;
      group.add(ring);
    }

    scene.add(group);
    return { group, body, nose, ring, bodyRadius };
  }

  function initBots() {
    botMeshes = [];
    for (const bot of engine.bots) {
      botMeshes.push(createBotGroup(bot));
    }
  }

  function updateBotMesh(botMesh, bot) {
    const { group, body, nose, ring } = botMesh;

    // Update body size
    const newRadius = 1.5 + bot.totalStats * 0.05;
    botMesh.bodyRadius = newRadius;

    // Position on sphere
    const surfacePos = fieldToSphere(bot.x, bot.y, PLANET_RADIUS);
    const up = surfacePos.clone().normalize();

    // Offset above surface
    const pos = surfacePos.clone().addScaledVector(up, newRadius * 0.5);
    group.position.copy(pos);

    // Orient: compute tangent from heading angle
    // The bot.angle is in 2D field space. We need to project it onto the sphere tangent plane.
    // Use a small step in the heading direction to get a tangent vector on the sphere surface.
    const stepSize = 5;
    const forwardFieldX = bot.x + Math.cos(bot.angle) * stepSize;
    const forwardFieldY = bot.y + Math.sin(bot.angle) * stepSize;
    const forwardPos = fieldToSphere(forwardFieldX, forwardFieldY, PLANET_RADIUS);
    const forward = forwardPos.clone().sub(surfacePos).normalize();

    // Make sure forward is tangent to surface (remove radial component)
    forward.addScaledVector(up, -forward.dot(up));
    forward.normalize();

    // If forward is degenerate, use a fallback
    if (forward.lengthSq() < 0.001) {
      forward.set(1, 0, 0);
      forward.addScaledVector(up, -forward.dot(up));
      forward.normalize();
    }

    // Build rotation matrix
    const matrix = new THREE.Matrix4();
    matrix.lookAt(
      new THREE.Vector3(0, 0, 0),
      forward,
      up
    );
    group.setRotationFromMatrix(matrix);

    // Scale body
    const currentScale = body.geometry.parameters.radius || 1.5;
    const scaleFactor = newRadius / 1.5; // base radius is 1.5
    body.scale.set(scaleFactor, scaleFactor, scaleFactor);

    // Update nose position
    nose.position.set(0, newRadius * 0.3, newRadius * scaleFactor + 0.4);

    // Update ring
    if (ring) {
      ring.scale.set(scaleFactor, scaleFactor, scaleFactor);
      ring.position.y = newRadius * 0.2;
    }

    // Emissive intensity based on attack
    body.material.emissiveIntensity = 0.2 + (bot.attack - 5) * 0.03;

    // Flash on damage
    if (bot.justTookDamage) {
      body.material.emissive.setHex(0xff4444);
      body.material.emissiveIntensity = 0.8;
    } else {
      body.material.emissive.setHex(bot.colorHex);
    }
  }

  // ---- Dots (Food) ----
  function createDotMesh() {
    const geo = new THREE.SphereGeometry(0.8, 8, 8);
    const mat = new THREE.MeshStandardMaterial({
      color: 0xffcc00,
      emissive: 0xffaa00,
      emissiveIntensity: 0.6,
      roughness: 0.3,
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);
    return { mesh };
  }

  function initDots() {
    dotMeshes = [];
    for (const dot of engine.dots) {
      dotMeshes.push(createDotMesh());
    }
  }

  function updateDotMesh(dotMesh, dot, time) {
    const pos = fieldToSphere(dot.x, dot.y, PLANET_RADIUS);
    const up = pos.clone().normalize();
    dotMesh.mesh.position.copy(pos).addScaledVector(up, 0.8);

    // Pulse animation
    const pulse = 0.4 + 0.3 * Math.sin(time * 3 + dot.x * 0.1);
    dotMesh.mesh.material.emissiveIntensity = pulse;
  }

  // ---- Crater (Death Marker) ----
  function addCrater(fieldX, fieldY) {
    const pos = fieldToSphere(fieldX, fieldY, PLANET_RADIUS);
    const up = pos.clone().normalize();

    const craterGeo = new THREE.CircleGeometry(1.5, 12);
    const craterMat = new THREE.MeshStandardMaterial({
      color: 0x1a1a1a,
      roughness: 1.0,
      metalness: 0.0,
      transparent: true,
      opacity: 0.7,
      depthWrite: false,
    });
    const crater = new THREE.Mesh(craterGeo, craterMat);

    // Position on surface, orient to face outward
    crater.position.copy(pos).addScaledVector(up, 0.15);

    // Orient disc to lie flat on surface
    const target = pos.clone().add(up);
    crater.lookAt(target);

    scene.add(crater);
    craterMeshes.push(crater);
  }

  // ---- Combat Flash ----
  function addCombatFlash(fieldX, fieldY) {
    const pos = fieldToSphere(fieldX, fieldY, PLANET_RADIUS);
    const up = pos.clone().normalize();
    const lightPos = pos.clone().addScaledVector(up, 3);

    const light = new THREE.PointLight(0xffffff, 3, 30);
    light.position.copy(lightPos);
    scene.add(light);
    combatFlashes.push({ light, frames: 15 });
  }

  // ---- Eat Particle Burst ----
  function addEatParticles(fieldX, fieldY) {
    const center = fieldToSphere(fieldX, fieldY, PLANET_RADIUS);
    const up = center.clone().normalize();

    const count = 8;
    const geo = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const velocities = [];

    for (let i = 0; i < count; i++) {
      const p = center.clone().addScaledVector(up, 1);
      positions[i * 3] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;

      // Random velocity tangent to surface
      const rndDir = new THREE.Vector3(
        Math.random() - 0.5,
        Math.random() - 0.5,
        Math.random() - 0.5
      );
      rndDir.addScaledVector(up, -rndDir.dot(up));
      rndDir.normalize().multiplyScalar(0.3 + Math.random() * 0.3);
      rndDir.addScaledVector(up, 0.2); // slight outward pop
      velocities.push(rndDir);
    }

    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const mat = new THREE.PointsMaterial({
      color: 0xffdd44,
      size: 2,
      sizeAttenuation: false,
      transparent: true,
      opacity: 1,
    });

    const points = new THREE.Points(geo, mat);
    scene.add(points);
    eatParticles.push({ points, velocities, frames: 20, geo });
  }

  // ---- Death/Spawn Animations ----
  function addDeathAnim(botIndex, fieldX, fieldY) {
    const pos = fieldToSphere(fieldX, fieldY, PLANET_RADIUS);
    deathAnims.push({ botIndex, frames: 15, startScale: 1 });
    addCrater(fieldX, fieldY);
  }

  function addSpawnAnim(botIndex) {
    spawnAnims.push({ botIndex, frames: 15 });
    if (botMeshes[botIndex]) {
      botMeshes[botIndex].group.scale.set(0.01, 0.01, 0.01);
    }
  }

  // ---- Process Events ----
  function processEvents() {
    for (const evt of engine.events) {
      switch (evt.type) {
        case 'eat':
          addEatParticles(evt.dotPos.x, evt.dotPos.y);
          break;
        case 'combat': {
          const mx = (evt.bot1.x + evt.bot2.x) / 2;
          const my = (evt.bot1.y + evt.bot2.y) / 2;
          addCombatFlash(mx, my);
          break;
        }
        case 'death':
          addDeathAnim(evt.bot.index, evt.x, evt.y);
          break;
        case 'spawn':
          addSpawnAnim(evt.bot.index);
          break;
      }
    }
  }

  // ---- Update Animations ----
  function updateAnimations() {
    // Combat flashes
    for (let i = combatFlashes.length - 1; i >= 0; i--) {
      const cf = combatFlashes[i];
      cf.frames--;
      cf.light.intensity = 3 * (cf.frames / 15);
      if (cf.frames <= 0) {
        scene.remove(cf.light);
        combatFlashes.splice(i, 1);
      }
    }

    // Eat particles
    for (let i = eatParticles.length - 1; i >= 0; i--) {
      const ep = eatParticles[i];
      ep.frames--;
      const positions = ep.geo.attributes.position;
      for (let j = 0; j < ep.velocities.length; j++) {
        positions.setXYZ(j,
          positions.getX(j) + ep.velocities[j].x,
          positions.getY(j) + ep.velocities[j].y,
          positions.getZ(j) + ep.velocities[j].z
        );
        // Slow down
        ep.velocities[j].multiplyScalar(0.92);
      }
      positions.needsUpdate = true;
      ep.points.material.opacity = ep.frames / 20;
      if (ep.frames <= 0) {
        scene.remove(ep.points);
        ep.geo.dispose();
        ep.points.material.dispose();
        eatParticles.splice(i, 1);
      }
    }

    // Death animations (shrink)
    for (let i = deathAnims.length - 1; i >= 0; i--) {
      const da = deathAnims[i];
      da.frames--;
      // Note: the bot has already respawned by this point in the engine,
      // so the shrink is just visual if we can still see the mesh.
      // Since the bot respawns instantly, we handle the visual via spawn animation.
      if (da.frames <= 0) {
        deathAnims.splice(i, 1);
      }
    }

    // Spawn animations (grow)
    for (let i = spawnAnims.length - 1; i >= 0; i--) {
      const sa = spawnAnims[i];
      sa.frames--;
      const t = 1 - (sa.frames / 15);
      const scale = t * t; // ease in
      if (botMeshes[sa.botIndex]) {
        botMeshes[sa.botIndex].group.scale.set(scale, scale, scale);
      }
      if (sa.frames <= 0) {
        if (botMeshes[sa.botIndex]) {
          botMeshes[sa.botIndex].group.scale.set(1, 1, 1);
        }
        spawnAnims.splice(i, 1);
      }
    }
  }

  // ---- Follow Mode ----
  function updateFollow() {
    if (!followMode || !engine.followedBot) return;

    const targetPos = fieldToSphere(engine.followedBot.x, engine.followedBot.y, PLANET_RADIUS);
    const desiredCamDir = targetPos.clone().normalize();
    const desiredCamPos = desiredCamDir.multiplyScalar(controls.getDistance());

    camera.position.lerp(desiredCamPos, 0.03);
    controls.target.set(0, 0, 0);
  }

  // ---- HUD ----
  function updateHUD() {
    const bot = engine.followedBot || engine.playerBot;
    if (!bot) return;

    const name = bot.isPlayer ? 'Player Bot' : `Bot ${bot.index}`;
    document.getElementById('hud-bot-name').textContent = name;
    document.getElementById('hud-spd').textContent = bot.speed.toFixed(1);
    document.getElementById('hud-atk').textContent = bot.attack.toFixed(1);
    document.getElementById('hud-def').textContent = bot.defence.toFixed(1);
    document.getElementById('hud-liv').textContent = bot.lives.toFixed(1);
    document.getElementById('hud-kills').textContent = bot.killCount;
    document.getElementById('hud-pop').textContent = `${engine.bots.length}/${BOT_COUNT}`;

    const elapsed = Math.floor((performance.now() - startTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    document.getElementById('hud-time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
  }

  // ---- Keyboard Controls ----
  document.addEventListener('keydown', (e) => {
    if (!started) return;

    switch (e.code) {
      case 'Tab':
        e.preventDefault();
        engine.cycleFollowedBot();
        break;
      case 'Space':
        e.preventDefault();
        engine.paused = !engine.paused;
        document.getElementById('pause-overlay').style.display = engine.paused ? 'flex' : 'none';
        break;
      case 'KeyA':
        autoRotate = !autoRotate;
        controls.autoRotate = autoRotate;
        break;
      case 'KeyF':
        followMode = !followMode;
        break;
    }
  });

  // ---- Main Loop ----
  function animate() {
    requestAnimationFrame(animate);

    engine.update();
    processEvents();

    const time = performance.now() * 0.001;

    // Update atmosphere camera uniform
    const atmosMesh = scene.getObjectByName('atmosphere');
    if (atmosMesh) {
      atmosMesh.material.uniforms.cameraPos.value.copy(camera.position);
    }

    // Update bots
    for (let i = 0; i < engine.bots.length; i++) {
      if (botMeshes[i]) {
        updateBotMesh(botMeshes[i], engine.bots[i]);
      }
    }

    // Update dots
    for (let i = 0; i < engine.dots.length; i++) {
      if (dotMeshes[i]) {
        updateDotMesh(dotMeshes[i], engine.dots[i], time);
      }
    }

    // Animations
    updateAnimations();

    // Follow
    updateFollow();

    // Controls
    controls.update();

    // HUD
    if (engine.frameCount % 5 === 0) updateHUD();

    renderer.render(scene, camera);
  }

})();
</script>
</body>
</html>
